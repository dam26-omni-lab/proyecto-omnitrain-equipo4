<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menú Principal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background-image:url("../img/ciudad_moderna_fondo.png");
            
            /* --- AJUSTES PARA EL BUCLE INFINITO --- */
            background-size:auto 100vh; /* Se ajusta al alto, el ancho es automático */
            background-position:0 bottom; /* Posición inicial */
            background-repeat:repeat-x; /* Se repite infinitamente hacia los lados */
            
            width:100vw;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            /* --- ANIMACIÓN --- */
            /* 30s es la duración. Cambia este número para hacerlo más rápido o más lento */
            animation: moverFondo 30s linear infinite;

        }

        /* --- CREACIÓN DEL MOVIMIENTO --- */
        @keyframes moverFondo {
            0% {
                background-position: 0 bottom;
            }
            100% {
                background-position: -100vw bottom;
            }
        }

        /* Oscurece ligeramente el fondo para que los elementos resalten */
        body::before{

            content:"";

            position:absolute;

            width:100%;
            height:100%;

            background:rgba(0,0,0,.35);

            z-index:0;

        }

        .menu{

            position:relative;
            z-index:1;

            display:flex;
            flex-direction:column;

            align-items:center;

        }

        button{

            width:320px;

            padding:18px;

            margin:12px;

            font-size:22px;

            color:white;

            background:rgba(15,15,25,.75);

            border:2px solid #00bfff;

            border-radius:12px;

            cursor:pointer;

            transition:all .30s ease;

            backdrop-filter:blur(4px);

        }

        button:hover{

            transform:scale(1.05);

            background:#00bfff;

            color:black;

            box-shadow:
                0 0 15px #00bfff,
                0 0 30px #00bfff;

        }

        button:active{

            transform:scale(.97);

        }

    </style>

</head>

<body>

</body>

</html>
